<section class="hl-section hl-stats{f:if(condition: data.dark_background, then: ' hl-section--dark')}">
    <div class="hl-container">
        <f:if condition="{data.headline}">
            <h2>{data.headline}</h2>
        </f:if>
        <div class="hl-stats__band">
            <f:for each="{data.stat_items}" as="item">
                <div class="hl-stat">
                    <div class="hl-stat__value">{item.value}</div>
                    <div class="hl-stat__label">{item.label}</div>
                </div>
            </f:for>
        </div>
        <f:if condition="{data.footnote}">
            <p class="hl-stats__footnote">{data.footnote -> f:format.nl2br()}</p>
        </f:if>
    </div>
</section>
