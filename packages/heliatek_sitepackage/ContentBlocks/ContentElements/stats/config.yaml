name: heliatek/stats
title: Zahlen & Fakten
group: heliatek
prefixFields: false
fields:
  - identifier: headline
    type: Text
  - identifier: dark_background
    type: Checkbox
    renderType: checkboxToggle
    default: 0
    description: 'Standard: Überschrift auf hellem Grund, Zahlen im Mint-Band. Aktivieren für dunkle Sektion.'
  - identifier: stat_items
    type: Collection
    labelField: label
    fields:
      - identifier: value
        type: Text
        required: true
        description: 'Zahl oder Kurzangabe, z. B. ~2×, <2 kg, ≈2 mm, 50 cm'
      - identifier: label
        type: Text
        required: true
  - identifier: footnote
    type: Textarea
    rows: 2
    description: 'Kleiner grauer Hinweis unter dem Band, z. B. „Vorläufige Ziel- und Richtwerte …"'
