name: heliatek/cta
title: Call-to-Action
group: heliatek
prefixFields: false
fields:
  - identifier: headline
    type: Text
    required: true
  - identifier: text
    type: Textarea
    rows: 3
  - identifier: cta_buttons
    type: Collection
    labelField: label
    maxitems: 2
    fields:
      - identifier: label
        type: Text
        required: true
      - identifier: link
        type: Link
        required: true
      - identifier: style
        type: Select
        renderType: selectSingle
        default: primary
        items:
          - label: 'Primär (grün)'
            value: primary
          - label: 'Sekundär (Umriss)'
            value: secondary
