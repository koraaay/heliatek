<section class="hl-section hl-section--alt">
    <div class="hl-container">
        <blockquote class="hl-quote{f:if(condition: data.image, then: ' hl-quote--with-image')}">
            <f:if condition="{data.image}">
                <div class="hl-quote__image">
                    <f:for each="{data.image}" as="image">
                        <f:image image="{image}" alt="{f:if(condition: image.alternative, then: image.alternative, else: data.author)}" loading="lazy" />
                    </f:for>
                </div>
            </f:if>
            <div>
                <p class="hl-quote__text">{data.quote -> f:format.nl2br()}</p>
                <f:if condition="{data.author}">
                    <footer>
                        <span class="hl-quote__author">{data.author}</span>
                        <f:if condition="{data.author_role}">
                            <span class="hl-quote__role"> – {data.author_role}</span>
                        </f:if>
                    </footer>
                </f:if>
            </div>
        </blockquote>
    </div>
</section>
