<section class="hl-section hl-imageblock">
    <div class="hl-container">
        <figure class="hl-imageblock__figure" style="aspect-ratio:{data.aspect -> f:format.raw()}">
            <f:for each="{data.image}" as="image">
                <f:image image="{image}" alt="{image.alternative}" loading="lazy" />
            </f:for>
            <f:if condition="{data.annotation}">
                <figcaption class="hl-imageblock__annotation">{data.annotation}</figcaption>
            </f:if>
        </figure>
    </div>
</section>
