<footer class="hl-footer">
    <div class="hl-container hl-footer__inner">
        <div class="hl-footer__brand">
            <img class="hl-footer__logo" src="{f:uri.resource(path: 'EXT:heliatek_sitepackage/Resources/Public/Images/HEL_full_RGB.svg')}" alt="Heliatek" />
            <p class="hl-footer__claim">Independent. Green. Future.</p>
        </div>
        <div class="hl-footer__meta">
            <f:for each="{footerMenu}" as="item">
                <a href="{item.link}" class="hl-footer__link">{item.title}</a>
            </f:for>
            <p>&copy; {f:format.date(date: 'now', format: 'Y')} Heliatek GmbH</p>
        </div>
    </div>
</footer>
